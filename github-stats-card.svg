<svg
  width="866"
  height="285"
  viewBox="0 0 866 285"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="GitHub stats and most used languages"
>
  <defs>
    <linearGradient id="unified-card-bg" gradientTransform="rotate(30)" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e96443" />
      <stop offset="100%" stop-color="#904e95" />
    </linearGradient>
  </defs>
  <rect x="0.5" y="0.5" rx="4.5" width="865" height="284" fill="url(#unified-card-bg)" stroke="#e4e2e2" stroke-opacity="1.0" />
  <svg x="0" y="82" width="576" height="120" viewBox="0 0 576 120">
    <style>
    .text { font: 600 16px 'Segoe UI', Ubuntu, Sans-Serif; fill: #fff }
    .small { font: 600 12px 'Segoe UI', Ubuntu, Sans-Serif; fill: #fff }
    .gray { fill: #858585 }
    </style>
    <rect x="0.5" y="0.5" width="575.5" height="99%" rx="4.5" fill="[30 e96443 904e95]" stroke="#e4e2e2"/>
    <text x="25" y="45" class="text">Something went wrong! file an issue at https://tiny.one/readme-stats</text>
    <text data-testid="message" x="25" y="55" class="text small">
      <tspan x="25" dy="18">Resource not accessible by integration</tspan>
      <tspan x="25" dy="18" class="gray">FORBIDDEN</tspan>
    </text>
    </svg>
  <svg x="566" y="0" width="300" height="285" viewBox="0 0 300 285">
        <title id="titleId"></title>
        <desc id="descId"></desc>
        <style>
          .header {
            font: 600 18px 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif;
            fill: #fff;
            animation: fadeInAnimation 0.8s ease-in-out forwards;
          }
          @supports(-moz-appearance: auto) {
            /* Selector detects Firefox */
            .header { font-size: 15.5px; }
          }
          
    .lang-name {
      font: 400 11px 'Segoe UI', Ubuntu, Sans-Serif; fill: #fff;
    }
    .stagger {
      opacity: 0;
      animation: fadeInAnimation 0.3s ease-in-out forwards;
    }
    .lang-progress {
      animation: growWidthAnimation 0.6s ease-in-out forwards;
    }
    #rect-mask rect {
      animation: slideInAnimation 1s ease-in-out forwards;
    }
    @keyframes progressAnimation {
      from {
        width: 0;
      }
    }
    @keyframes slideInAnimation {
      from {
        width: 0;
      }
      to {
        width: calc(100%-100px);
      }
    }
    @keyframes growWidthAnimation {
      from {
        width: 0;
      }
      to {
        width: 100%;
      }
    }
    @keyframes fadeInAnimation {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
  

          
      /* Animations */
      @keyframes scaleInAnimation {
        from {
          transform: translate(-5px, 5px) scale(0);
        }
        to {
          transform: translate(-5px, 5px) scale(1);
        }
      }
      @keyframes fadeInAnimation {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes slideInAnimation {
        from {
          transform: translateX(-10px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      @keyframes bounceInAnimation {
        0% {
          transform: scale(0.3);
          opacity: 0;
        }
        50% {
          transform: scale(1.05);
        }
        70% {
          transform: scale(0.9);
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
    
          
        </style>

        
        
        

        

        
      <g
        data-testid="card-title"
        transform="translate(25, 35)"
      >
        <g transform="translate(0, 0)">
      <text
        x="0"
        y="0"
        class="header"
        data-testid="header"
      >Most Used Languages</text>
    </g>
      </g>
    

        <g
          data-testid="main-card-body"
          transform="translate(0, 55)"
        >
          
    <svg data-testid="lang-items" x="25">
      <g transform="translate(0, 0)">
      <g class="stagger" style="animation-delay: 450ms">
        <text data-testid="lang-name" x="2" y="15" class="lang-name">C++</text>
        <text x="215" y="34" class="lang-name" data-testid="lang-name">62.1%</text>
        
    <svg width="205" x="0" y="25">
      <rect rx="5" ry="5" x="0" y="0" width="205" height="8" fill="#ddd"></rect>
      <svg data-testid="lang-progress" width="62.07%">
        <rect
            height="8"
            fill="#f34b7d"
            rx="5" ry="5" x="0" y="0"
            class="lang-progress"
            style="animation-delay: 750ms;"
        />
      </svg>
    </svg>
  
      </g>
    </g><g transform="translate(0, 40)">
      <g class="stagger" style="animation-delay: 600ms">
        <text data-testid="lang-name" x="2" y="15" class="lang-name">Jupyter Notebook</text>
        <text x="215" y="34" class="lang-name" data-testid="lang-name">18.2%</text>
        
    <svg width="205" x="0" y="25">
      <rect rx="5" ry="5" x="0" y="0" width="205" height="8" fill="#ddd"></rect>
      <svg data-testid="lang-progress" width="18.24%">
        <rect
            height="8"
            fill="#DA5B0B"
            rx="5" ry="5" x="0" y="0"
            class="lang-progress"
            style="animation-delay: 900ms;"
        />
      </svg>
    </svg>
  
      </g>
    </g><g transform="translate(0, 80)">
      <g class="stagger" style="animation-delay: 750ms">
        <text data-testid="lang-name" x="2" y="15" class="lang-name">C</text>
        <text x="215" y="34" class="lang-name" data-testid="lang-name">13.2%</text>
        
    <svg width="205" x="0" y="25">
      <rect rx="5" ry="5" x="0" y="0" width="205" height="8" fill="#ddd"></rect>
      <svg data-testid="lang-progress" width="13.19%">
        <rect
            height="8"
            fill="#555555"
            rx="5" ry="5" x="0" y="0"
            class="lang-progress"
            style="animation-delay: 1050ms;"
        />
      </svg>
    </svg>
  
      </g>
    </g><g transform="translate(0, 120)">
      <g class="stagger" style="animation-delay: 900ms">
        <text data-testid="lang-name" x="2" y="15" class="lang-name">TeX</text>
        <text x="215" y="34" class="lang-name" data-testid="lang-name">5.3%</text>
        
    <svg width="205" x="0" y="25">
      <rect rx="5" ry="5" x="0" y="0" width="205" height="8" fill="#ddd"></rect>
      <svg data-testid="lang-progress" width="5.27%">
        <rect
            height="8"
            fill="#3D6117"
            rx="5" ry="5" x="0" y="0"
            class="lang-progress"
            style="animation-delay: 1200ms;"
        />
      </svg>
    </svg>
  
      </g>
    </g><g transform="translate(0, 160)">
      <g class="stagger" style="animation-delay: 1050ms">
        <text data-testid="lang-name" x="2" y="15" class="lang-name">GLSL</text>
        <text x="215" y="34" class="lang-name" data-testid="lang-name">1.2%</text>
        
    <svg width="205" x="0" y="25">
      <rect rx="5" ry="5" x="0" y="0" width="205" height="8" fill="#ddd"></rect>
      <svg data-testid="lang-progress" width="2.00%">
        <rect
            height="8"
            fill="#5686a5"
            rx="5" ry="5" x="0" y="0"
            class="lang-progress"
            style="animation-delay: 1350ms;"
        />
      </svg>
    </svg>
  
      </g>
    </g>
    </svg>
  
        </g>
      </svg>
</svg>
