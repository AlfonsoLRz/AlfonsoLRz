name: GitHub-Readme-Stats

on:
  schedule: # 02:30 UTC (staggered from profile-3d.yml at 18:00 UTC)
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-readme-stats
    steps:
      - uses: actions/checkout@v5

      # Two cards are rendered separately, then composed into one unified card
      # (github-stats-card.svg) sharing a single gradient background and border.
      # Rendered inside CI and committed to the repo (no external rate limits).
      # GITHUB_TOKEN is enough for public stats; swap in a classic PAT secret if
      # you also want private/total contribution counts.
      - name: Generate stats card
        uses: soulteary/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&bg_color=30,e96443,904e95&title_color=fff&text_color=fff&rank_icon=github
          path: github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Top languages card — same warm gradient as before. NOTE: this action's
      # renderer supports only the 'normal' and 'compact' layouts (no donut), so we
      # use the default 'normal' bar layout; the next step fixes its card height.
      - name: Generate top-languages card
        uses: soulteary/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&bg_color=30,e96443,904e95&title_color=fff&text_color=fff
          path: github-top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # The renderer sizes the bar card with a too-short height, clipping the last
      # language row. Re-size the SVG canvas to fit every row plus bottom padding.
      # The card background is height="99%", so the gradient stretches to fill.
      - name: Fit languages card height (+ bottom padding)
        run: |
          f=github-top-langs.svg
          rows=$(grep -oE 'data-testid="lang-progress"' "$f" | wc -l)
          if [ "$rows" -ge 1 ]; then
            # rows start at y=55 with a 40px pitch; last row ends ~38px below its top
            content_bottom=$(( 55 + (rows - 1) * 40 + 38 ))
            target=$(( content_bottom + 22 ))          # ~22px bottom padding
            cur=$(grep -oiE 'viewBox="0 0 [0-9]+ [0-9]+"' "$f" | head -1 | grep -oE '[0-9]+' | tail -1)
            [ "$target" -lt "$cur" ] && target=$cur    # only ever grow, never clip
            sed -i -E "s/(viewBox=\"0 0 [0-9]+ )$cur(\")/\1$target\2/" "$f"
            sed -i -E "s/(height=\")$cur(\")/\1$target\2/" "$f"
            echo "languages card: rows=$rows, height $cur -> $target"
          else
            echo "no language rows found; leaving card height unchanged"
          fi

      # Merge both cards into one unified SVG, then drop the intermediates so the
      # repo only carries the single combined card referenced by the README.
      - name: Compose unified card
        run: |
          python3 .github/scripts/compose_card.py github-stats.svg github-top-langs.svg github-stats-card.svg
          rm -f github-stats.svg github-top-langs.svg

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          if git commit -m "generated"; then
            git push
          fi
