name: Metrics

on:
  schedule: # 04:30 CEST == 02:30 UTC (staggered from profile-3d.yml at 18:00 UTC)
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    name: generate-github-metrics
    steps:
      # Overall stats card (replaces the github-readme-stats "stats" image)
      - name: Overview
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          filename: metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Madrid
          output_action: commit

      # Language breakdown (replaces the github-readme-stats top-langs donut)
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          filename: metrics-languages.svg
          base: ""
          config_timezone: Europe/Madrid
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_languages_colors: github
          output_action: commit
